<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <rect width="1000" height="400" fill="#050505" rx="40"/>
  <image href="https://picsum.photos/seed/linuxia_vision/1200/600" width="1200" height="600" x="-100" y="-100" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" from="-50 -50" to="50 50" dur="20s" repeatCount="indefinite" />
  </image>
  <rect width="1000" height="400" fill="none" stroke="#ff6a00" stroke-width="2" opacity="0.3" rx="40"/>
  <g transform="translate(60, 180)">
    <animateTransform attributeName="transform" type="translate" values="60 180; 60 170; 60 180" dur="4s" repeatCount="indefinite" />
    <text font-family="sans-serif" font-size="80" font-weight="900" fill="white">VISION</text>
    <text y="50" font-family="monospace" font-size="20" fill="#ff6a00" font-weight="bold">PROOF-FIRST OPERATIONS</text>
  </g>
</svg>
