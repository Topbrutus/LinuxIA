  <rect width="1200" height="420" fill="url(#bg)"/>
  <image href="../gallery/p08.jpg" x="0" y="0" width="1200" height="420" preserveAspectRatio="xMidYMid slice" opacity="0.98"/>
  <rect width="1200" height="420" fill="url(#shade)"/>
  <rect x="0" y="0" width="1200" height="420" fill="url(#grid)" opacity="1"/>
