      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0.15  0 1 0 0 0.05  0 0 1 0 0  0 0 0 0.85 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="textShadow">
