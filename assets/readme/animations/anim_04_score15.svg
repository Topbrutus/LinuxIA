<svg width="100%" height="100" viewBox="0 0 1440 100">
<style>
/* LinuxIA label contrast patch */
text{
  paint-order: stroke fill;
  stroke: rgba(0,0,0,0.95);
  stroke-width: 10;
  stroke-linejoin: round;
  stroke-linecap: round;
  vector-effect: non-scaling-stroke;
}
</style>

  <linearGradient id="footerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFD700"/>
    <stop offset="50%" stop-color="#FFA500"/>
    <stop offset="100%" stop-color="#73BA25"/>
  </linearGradient>
  
  <path d="M0 50 Q360 20, 720 50 T1440 50"
        stroke="url(#footerGradient)"
        stroke-width="2"
        fill="none"
        opacity="0.6">
    <animate attributeName="d"
             values="M0 50 Q360 20, 720 50 T1440 50;
                     M0 50 Q360 80, 720 50 T1440 50;
                     M0 50 Q360 20, 720 50 T1440 50"
             dur="10s"
             repeatCount="indefinite"/>
  </path>
</svg>