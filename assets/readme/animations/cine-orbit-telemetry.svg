<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-label="LinuxIA Orbit Telemetry">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A10"/>
      <stop offset="1" stop-color="#050712"/>
    </linearGradient>

    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6a00"/>
      <stop offset="0.5" stop-color="#00ff7b"/>
      <stop offset="0.85" stop-color="#00b3ff"/>
      <stop offset="1" stop-color="#ff6a00"/>
      <animate attributeName="x1" dur="8s" values="0;1;0" repeatCount="indefinite"/>
      <animate attributeName="x2" dur="8s" values="1;0;1" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="vig" cx="52%" cy="42%" r="70%">
      <stop offset="0" stop-color="rgba(0,0,0,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>

    <pattern id="scan" width="4" height="7" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" y="0" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#scan)" opacity="0.18"/>

  <g filter="url(#glow)" opacity="0.95">
    <ellipse cx="840" cy="220" rx="520" ry="200" fill="none" stroke="rgba(255,106,0,0.22)" stroke-width="2"/>
    <ellipse cx="840" cy="220" rx="420" ry="160" fill="none" stroke="rgba(0,255,123,0.20)" stroke-width="2"/>
    <ellipse cx="840" cy="220" rx="320" ry="120" fill="none" stroke="rgba(0,179,255,0.20)" stroke-width="2"/>

    <g>
      <circle cx="1360" cy="220" r="5" fill="#ff6a00"/>
      <animateTransform attributeName="transform" type="rotate" dur="10s" values="0 840 220;360 840 220" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="1260" cy="220" r="4" fill="#00ff7b"/>
      <animateTransform attributeName="transform" type="rotate" dur="8.2s" values="360 840 220;0 840 220" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="1160" cy="220" r="3.6" fill="#00b3ff"/>
      <animateTransform attributeName="transform" type="rotate" dur="6.8s" values="0 840 220;360 840 220" repeatCount="indefinite"/>
    </g>
  </g>

  <g filter="url(#glow)">
    <text x="72" y="92"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      font-size="30" font-weight="900" fill="rgba(255,255,255,0.92)">
      Telemetry Orbit — Proxmox x Matrix
    </text>
    <text x="72" y="124"
      font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
      font-size="14" fill="rgba(255,255,255,0.74)">
      VM100 Factory · VM101 Client · Agents · ZFS pools · SMB evidence · GitHub CI
    </text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" filter="url(#glow)">
    <g transform="translate(72,160)">
      <rect width="360" height="44" rx="12" fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,0.10)"/>
      <text x="14" y="28" fill="rgba(255,255,255,0.78)">ZFS ARC</text>
      <rect x="92" y="18" width="250" height="10" rx="6" fill="rgba(255,255,255,0.10)"/>
      <rect x="92" y="18" width="150" height="10" rx="6" fill="url(#a)">
        <animate attributeName="width" dur="4.6s" values="120;210;150" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(72,214)">
      <rect width="360" height="44" rx="12" fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,0.10)"/>
      <text x="14" y="28" fill="rgba(255,255,255,0.78)">SMB MIRROR</text>
      <rect x="120" y="18" width="222" height="10" rx="6" fill="rgba(255,255,255,0.10)"/>
      <rect x="120" y="18" width="190" height="10" rx="6" fill="url(#a)">
        <animate attributeName="width" dur="3.9s" values="160;210;190" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(72,268)">
      <rect width="360" height="44" rx="12" fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,0.10)"/>
      <text x="14" y="28" fill="rgba(255,255,255,0.78)">AGENT OPS</text>
      <rect x="120" y="18" width="222" height="10" rx="6" fill="rgba(255,255,255,0.10)"/>
      <rect x="120" y="18" width="170" height="10" rx="6" fill="url(#a)">
        <animate attributeName="width" dur="4.2s" values="120;220;170" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <rect width="1600" height="420" fill="url(#vig)"/>
</svg>
