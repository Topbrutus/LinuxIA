name: "Docs request"
description: "Documentation improvements or additions."
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: textarea
    id: context
    attributes:
      label: Contexte
      description: "OS, branche, section concernée. Pourquoi cette documentation est-elle nécessaire ?"
      placeholder: "openSUSE..., branch..., section docs/..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Étapes pour reproduire le manque de documentation
      placeholder: "1) ... 2) ... 3) ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ce que la documentation devrait expliquer (résultat attendu)
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Ce qui est actuellement documenté / manquant (résultat obtenu)
    validations:
      required: true
  - type: textarea
    id: where
    attributes:
      label: Where (file/path/section)?
      description: "Point to docs/..., README section, or script."
    validations:
      required: false
  - type: textarea
    id: proof
    attributes:
      label: Proof / logs / examples
      description: "Commands, screenshots, links, expected outcome."
    validations:
      required: false
