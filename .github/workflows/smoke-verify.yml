name: smoke-verify-platform

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke — scripts syntax + shellcheck (read-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: bash -n (syntax check)
        run: |
          bash -n scripts/verify-platform.sh
          if ls scripts/*.sh >/dev/null 2>&1; then
            for f in scripts/*.sh; do bash -n "$f"; done
          fi

      - name: Run verify-platform (read-only smoke)
        run: |
          output=$(bash scripts/verify-platform.sh 2>&1) || true
          echo "$output"
          echo "$output" | grep -q "=== Summary ===" || { echo "ERROR: Summary line missing from verify-platform output"; exit 1; }

      - name: ShellCheck (warnings)
        continue-on-error: true
        run: |
          shellcheck --version
          if ls scripts/*.sh >/dev/null 2>&1; then
            shellcheck -x --severity=warning scripts/*.sh
          fi

      - name: Makefile dry-run (if present)
        run: |
          if [ -f Makefile ]; then
            make -n doctor
            make -n lint
          else
            printf "No Makefile (skip)\n"
          fi

      - name: CLI smoke (scripts/linuxia)
        run: |
          bash -n scripts/linuxia
          ./scripts/linuxia help >/dev/null
          ./scripts/linuxia version || true
