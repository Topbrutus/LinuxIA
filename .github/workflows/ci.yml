name: linuxia-ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check (bash -n)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck (scripts/*.sh)
        continue-on-error: true
        run: |
          shellcheck --version
          # Warning-only: output is visible in PR checks but does not block the build
          shellcheck -x --severity=warning --exclude=SC2155 scripts/*.sh
