<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ChromIAlux</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="logo">ChromIAlux</div>
      <div class="sub">Matrix 1→9 • Tokens • Macro par tuile • SSH défaut</div>
    </div>
    <div class="bar">
      <button id="newSession">Nouvelle</button>
      <button id="resumeSession">Reprendre</button>
      <button id="saveSession">💾 Save</button>
      <button id="exportNow">📦 Export+SSH</button>
      <button id="relaySend" title="Envoyer au remote">📤 Send remote</button>
      <button id="relayCheck" title="Vérifier retour remote">🔄 Check return</button>
      <span id="relayIndicator" class="tag relay-local">LOCAL</span>
      <span id="sessionTag" class="tag"></span>
    </div>
  </header>

  <section class="bus">
    <textarea id="prompt" placeholder="Écris/colle ici… (Enter = lancer)"></textarea>
    <div class="busBtns">
      <button id="send">Envoyer ↩</button>
    </div>
  </section>

  <main>
    <div class="controls">
      <button id="addAgent">+ Tuile</button>
    </div>
    <div id="grid" class="grid"></div>
  </main>

  <dialog id="dlg">
    <div class="dlgTitle">Session</div>
    <div class="dlgBody">
      <div class="dlgRow">
        <label>Dernières sessions :</label>
        <select id="sessionList"></select>
      </div>
      <div class="dlgRow btns">
        <button id="loadSel">Charger</button>
        <button id="closeDlg">Fermer</button>
      </div>
    </div>
  </dialog>

  <!-- Relay setup modal -->
  <dialog id="relayDlg">
    <div class="dlgTitle">🛰️ Remote Relay SSH</div>
    <div class="dlgBody">
      <div class="dlgRow">
        <label>Activer le relay distant ?</label>
        <div style="display:flex;gap:10px">
          <button id="relayYes">✅ Oui</button>
          <button id="relayNo">Non</button>
        </div>
      </div>
      <div id="relayOptions" style="display:none">
        <div class="dlgRow">
          <label>Profil remote</label>
          <input id="relayProfile" type="text" value="ami1" style="background:#0b0d12;color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:8px"/>
        </div>
        <div class="dlgRow">
          <label>Mode retour</label>
          <select id="relayPollMode">
            <option value="AUTO">AUTO (poll 10s)</option>
            <option value="MANUAL">MANUEL (bouton Check)</option>
          </select>
        </div>
        <div class="dlgRow btns">
          <button id="relayConfirm">Confirmer</button>
        </div>
      </div>
    </div>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
