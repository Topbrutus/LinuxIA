<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d1fae5" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Floor -->
  <rect width="1200" height="800" fill="#f0fdf4"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <!-- Walls -->
  <rect x="0" y="0" width="1200" height="16" fill="#6ee7b7"/>
  <rect x="0" y="784" width="1200" height="16" fill="#6ee7b7"/>
  <rect x="0" y="0" width="16" height="800" fill="#6ee7b7"/>
  <rect x="1184" y="0" width="16" height="800" fill="#6ee7b7"/>
  <!-- Frigo 1 -->
  <rect x="900" y="40" width="250" height="280" rx="8" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <text x="1025" y="190" text-anchor="middle" fill="#1e40af" font-size="18" font-family="sans-serif" font-weight="bold">Frigo 1</text>
  <!-- Frigo 2 -->
  <rect x="900" y="360" width="250" height="280" rx="8" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <text x="1025" y="510" text-anchor="middle" fill="#1e40af" font-size="18" font-family="sans-serif" font-weight="bold">Frigo 2</text>
  <!-- Étagère A -->
  <rect x="40" y="40" width="300" height="240" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="190" y="170" text-anchor="middle" fill="#065f46" font-size="18" font-family="sans-serif" font-weight="bold">Snacks</text>
  <!-- Étagère B -->
  <rect x="40" y="330" width="300" height="300" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="190" y="490" text-anchor="middle" fill="#065f46" font-size="18" font-family="sans-serif" font-weight="bold">Épicerie</text>
  <!-- Ménage -->
  <rect x="420" y="460" width="380" height="280" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="610" y="610" text-anchor="middle" fill="#713f12" font-size="18" font-family="sans-serif" font-weight="bold">Ménage</text>
  <!-- Caisse -->
  <rect x="420" y="40" width="300" height="160" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="570" y="130" text-anchor="middle" fill="#831843" font-size="18" font-family="sans-serif" font-weight="bold">Caisse</text>
</svg>
